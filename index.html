</head>

<script>
(function () {

  const DRYING_L_FACTOR = 0.95;
  const CATEGORY = { WATER: 'water', SOLVENT: 'solvent' };

  // ═══════════════════════════════════════════════════════════════
  // ColorDatabase — 3社・全製品・全標準色（L*a*b* 生成＋参照）
  // ═══════════════════════════════════════════════════════════════

      },

        baseRatio: 1.41,
        blackTint: 0.83,
        blackKS: 8.8,
        whiteKS: 0.052,
        accent: 'text-purple-400',
      },
    };

    const products = {
      nippon: {
        water1: [
          { id: 'pt', name: 'パーフェクトトップ', systems: ['nd', 'jot'] },
          { id: 'ode', name: 'オーデフレッシュSi100III', systems: ['nd', 'jot'] },
          { id: 'wsu', name: '水性シリコンセラUV', systems: ['nd', 'jot'] },
          { id: 'ken', name: 'ニッペ水性ケンエース', systems: ['nd', 'jot'] },

          { id: 'fu1', name: 'ファインウレタンU100', systems: ['nd', 'jot'] },
          { id: 'fu1p', name: '1液ファインウレタンU100', systems: ['nd', 'jot'] },
        ],
        solvent2: [
          { id: 'fsf2', name: 'ファインシリコンフレッシュII（2液）', systems: ['nd', 'jot'] },
          { id: 'f4f2', name: 'ファイン4Fセラミック（2液）', systems: ['nd', 'jot'] },
          { id: 'fu2', name: 'ファインウレタンU100（2液）', systems: ['nd', 'jot'] },
          { id: 'fu2p', name: '1液ファインウレタンU100（2液）', systems: ['nd', 'jot'] },
        ],
      },
      kansai: {
        water1: [
          { id: 'adt', name: 'アレスダイナミックTOP', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'aac', name: 'アレスアクアシリコンACII', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'aqua', name: 'アクアグロス', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'kara', name: '水性からnet', systems: ['kp', 'cosmo', 'jot'] },
        ],
        water2: [
          { id: 'adt2', name: 'アレスダイナミックTOP（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'aac2', name: 'アレスアクアシリコンACII（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'aqua2', name: 'アクアグロス（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'kara2', name: '水性からnet（2液）', systems: ['kp', 'cosmo', 'jot'] },
        ],
        solvent1: [
          { id: 'aet', name: 'アレスエコレタンII', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'cms', name: 'コスモマイルドシリコンII', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'c3', name: 'セラMシリコンIII', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'ff2', name: 'フッソMフロンII', systems: ['kp', 'cosmo', 'jot'] },
        ],
        solvent2: [
          { id: 'aet2', name: 'アレスエコレタンII（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'cms2', name: 'コスモマイルドシリコンII（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'c32', name: 'セラMシリコンIII（2液）', systems: ['kp', 'cosmo', 'jot'] },
          { id: 'ff22', name: 'フッソMフロンII（2液）', systems: ['kp', 'cosmo', 'jot'] },
        ],
      },
      sk: {
        water1: [
          { id: 'eps', name: 'エスケープレミアムシリコン', systems: ['osr', 'skstd', 'jot'] },
          { id: 'wcs', name: '水性コンポシリコン', systems: ['osr', 'skstd', 'jot'] },
          { id: 'plc', name: 'プリーズコート', systems: ['osr', 'skstd', 'jot'] },
          { id: 'wcer', name: '水性セラミシリコン', systems: ['osr', 'skstd', 'jot'] },
        ],
        water2: [
          { id: 'eps2', name: 'エスケープレミアムシリコン（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'wcs2', name: '水性コンポシリコン（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'plc2', name: 'プリーズコート（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'wcer2', name: '水性セラミシリコン（2液）', systems: ['osr', 'skstd', 'jot'] },
        ],
        solvent1: [
          { id: 'cmu', name: 'クリーンマイルドウレタン', systems: ['osr', 'skstd', 'jot'] },
          { id: 'cmsk', name: 'クリーンマイルドシリコン', systems: ['osr', 'skstd', 'jot'] },
          { id: 'cmf', name: 'クリーンマイルドフッソ', systems: ['osr', 'skstd', 'jot'] },
          { id: 'm1u', name: '一液マイルドウレタン', systems: ['osr', 'skstd', 'jot'] },
        ],
        solvent2: [
          { id: 'cmu2', name: 'クリーンマイルドウレタン（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'cmsk2', name: 'クリーンマイルドシリコン（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'cmf2', name: 'クリーンマイルドフッソ（2液）', systems: ['osr', 'skstd', 'jot'] },
          { id: 'm1u2', name: '一液マイルドウレタン（2液）', systems: ['osr', 'skstd', 'jot'] },
        ],
      },
    };

    const systemMeta = {
      nd: { label: 'ND色', prefix: 'ND' },
      kp: { label: 'KP色', prefix: 'KP' },
      osr: { label: 'OSR色', prefix: 'OSR' },
      cosmo: { label: 'コスモ標準色', prefix: 'CS' },
      skstd: { label: 'SK製品標準色', prefix: 'SK' },
      jot: { label: '日塗工共通色', prefix: 'N' },
    };

    function hueFamily(n, span) {
      const h = (n * 137.508) % 360;
      const band = Math.floor((n % span) / (span / 8));
      const hues = [25, 55, 85, 145, 195, 235, 285, 330];
      return hues[band % hues.length] + (h % 12) - 6;
    }

    function labFromHueL(hDeg, L, chroma) {
      const rad = (hDeg * Math.PI) / 180;
      const C = chroma * (L / 100);
      return {
        L: Math.round(L * 10) / 10,
        a: Math.round(C * Math.cos(rad) * 10) / 10,
        b: Math.round(C * Math.sin(rad) * 10) / 10,
      };
    }

    function genRange(codes, nameFn) {
      return codes.map(({ code, n, L, hint }) => {
        const chroma = Math.max(2, Math.min(42, (100 - L) * 0.38 + (n % 17)));
        const lab = hint || labFromHueL(hueFamily(n, 400), L, chroma);
        return { code, name: nameFn(code, n), lab };
      });
    }

    function genND() {
      const arr = [];
      for (let n = 102; n <= 530; n++) {
        const L = n < 150 ? 88 + (150 - n) * 0.04
          : n < 250 ? 82 - (n - 150) * 0.12
          : n < 380 ? 68 - (n - 250) * 0.15
          : Math.max(18, 48 - (n - 380) * 0.2);
        arr.push({ code: `ND-${n}`, n, L });
      }
      return genRange(arr, (code) => `ND色 ${code}`);
    }

    function genKP() {
      const arr = [];
      for (let n = 110; n <= 390; n++) {
        const L = n < 140 ? 90 - (n - 110) * 0.08
          : n < 220 ? 78 - (n - 140) * 0.1
          : n < 320 ? 62 - (n - 220) * 0.12
          : Math.max(16, 42 - (n - 320) * 0.18);
        arr.push({ code: `KP-${n}`, n, L });
      }
      return genRange(arr, (code) => `KP色 ${code}`);
    }

    function genOSR() {
      const arr = [];
      for (let n = 101; n <= 428; n++) {
        const L = n < 130 ? 91 - (n - 101) * 0.06
          : n < 220 ? 79 - (n - 130) * 0.09
          : n < 340 ? 58 - (n - 220) * 0.1
          : Math.max(15, 40 - (n - 340) * 0.16);
        arr.push({ code: `OSR-${n}`, n, L });
      }
      return genRange(arr, (code) => `OSR ${code}`);
    }

    function genCosmo() {
      const arr = [];
      for (let n = 101; n <= 450; n += 1) {
        const L = 85 - (n % 70) * 0.55 - Math.floor(n / 100) * 3;
        arr.push({ code: `CS-${n}`, n, L: Math.max(20, L) });
      }
      return genRange(arr, (code) => `コスモ ${code}`);
    }

    function genSKStd() {
      const arr = [];
      for (let n = 1; n <= 200; n++) {
        arr.push({ code: `SK-${String(n).padStart(3, '0')}`, n, L: 88 - (n % 60) * 0.7 });
      }
      return genRange(arr, (code) => `SK標準 ${code}`);
    }

    function genJot() {
      const jotNames = [
        '白', '黒', '淡黄', '黄', '赤', '赤茶', '茶', '緑', '青', '濃青',
        '紫', '灰', '濃灰', '淡灰', 'オフホワイト', 'クリーム', 'ベージュ', 'アイボリー',
      ];
      const arr = [];
      for (let n = 1; n <= 120; n++) {
        const L = n <= 10 ? 95 - n * 0.5 : n <= 30 ? 88 - (n - 10) * 1.2 : 65 - (n - 30) * 0.35;
        const name = jotNames[(n - 1) % jotNames.length] + (n > 18 ? ` ${Math.ceil(n / 18)}` : '');
        arr.push({
          code: `N-${String(n).padStart(3, '0')}`,
          n,
          L: Math.max(18, L),
          hint: labFromHueL(hueFamily(n + 500, 120), Math.max(18, L), 8 + (n % 20)),
          name,
        });
      }
      return arr.map(({ code, name, lab, hint, n }) => ({
        code,
        name: name || `日塗工 ${code}`,
        lab: hint || labFromHueL(hueFamily(n + 500, 120), 70, 10),
      }));
    }

    const colorSystems = {
      nd: { id: 'nd', ...systemMeta.nd, colors: genND() },
      kp: { id: 'kp', ...systemMeta.kp, colors: genKP() },
      osr: { id: 'osr', ...systemMeta.osr, colors: genOSR() },
      cosmo: { id: 'cosmo', ...systemMeta.cosmo, colors: genCosmo() },
      skstd: { id: 'skstd', ...systemMeta.skstd, colors: genSKStd() },
      jot: { id: 'jot', ...systemMeta.jot, colors: genJot() },
    };

    const colorByKey = new Map();
    let totalColors = 0;
    Object.values(colorSystems).forEach((sys) => {
      sys.colors.forEach((col, i) => {
        col.id = `${sys.id}_${col.code}`;
        col.systemId = sys.id;
        colorByKey.set(col.id, col);
        totalColors++;
      });
    });

    function getProducts(mfrId, typeId) {
      return (products[mfrId] && products[mfrId][typeId]) || [];
    }

    function getColorsForProduct(product) {
      if (!product) return [];
      const seen = new Set();
      const list = [];
      product.systems.forEach((sid) => {
        const sys = colorSystems[sid];
        if (!sys) return;
        sys.colors.forEach((col) => {
          const key = col.code;
          if (seen.has(key)) return;
          seen.add(key);
          list.push({
            ...col,
            systemLabel: sys.label,
            display: `${col.code} — ${col.name}（${sys.label}）`,
          });
        });
      });
      list.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
      return list;
    }

    /** 製品番号マップ（検索用） */
    const productCodes = {
      pt: 'NP-PT', ode: 'NP-ODE', wsu: 'NP-WSU', ken: 'NP-KEN',
      pt2: 'NP-PT2', ode2: 'NP-ODE2', wsu2: 'NP-WSU2', ken2: 'NP-KEN2',
      fsf: 'NP-FSF', f4f: 'NP-F4F', fu1: 'NP-FU100', fu1p: 'NP-FU100-1',
      fsf2: 'NP-FSF2', f4f2: 'NP-F4F2', fu2: 'NP-FU100-2', fu2p: 'NP-FU2P',
      adt: 'KP-ADT', aac: 'KP-AAC', aqua: 'KP-AQUA', kara: 'KP-KARA',
      adt2: 'KP-ADT2', aac2: 'KP-AAC2', aqua2: 'KP-AQUA2', kara2: 'KP-KARA2',
      aet: 'KP-AET', cms: 'KP-CMS', c3: 'KP-CM3', ff2: 'KP-FF2',
      aet2: 'KP-AET2', cms2: 'KP-CMS2', c32: 'KP-CM32', ff22: 'KP-FF22',
      eps: 'SK-EPS', wcs: 'SK-WCS', plc: 'SK-PLC', wcer: 'SK-WCER',
      eps2: 'SK-EPS2', wcs2: 'SK-WCS2', plc2: 'SK-PLC2', wcer2: 'SK-WCER2',
      cmu: 'SK-CMU', cmsk: 'SK-CMS', cmf: 'SK-CMF', m1u: 'SK-M1U',
      cmu2: 'SK-CMU2', cmsk2: 'SK-CMSK2', cmf2: 'SK-CMF2', m1u2: 'SK-M1U2',
    };

    const productKeywordExtra = {
      pt: 'パーフェクト ぱーふぇくと perfect perfecttop',
      ode: 'オーデフレッシュ おーでふれっしゅ ode fresh si100',
      fsf: 'ファイン ふぁいん fine シリコンフレッシュ',
      f4f: 'ファイン 4f セラミック',
      fu1: 'ファイン ウレタン u100',
      fu1p: '1液 いちえき ファインウレタン',
      adt: 'アレス あれす ダイナミック dynamic',
      aac: 'アクアシリコン aqua',
      cms: 'コスモ こすも マイルド mild シリコン',
      cmu: 'クリーンマイルド くりーんまいるど ウレタン urethan',
      cmsk: 'クリーンマイルド シリコン',
      cmf: 'クリーンマイルド フッソ fuso',
      eps: 'エスケー えすけー プレミアム premium シリコン',
      wcs: 'コンポ こんぽ composi',
    };

    const productCatalog = [];
    Object.keys(products).forEach((mfrId) => {
      const mfr = manufacturers[mfrId];
      Object.keys(products[mfrId]).forEach((typeId) => {
        const type = types.find((t) => t.id === typeId);
        products[mfrId][typeId].forEach((prod) => {
          const code = productCodes[prod.id] || `${mfrId.toUpperCase()}-${prod.id.toUpperCase()}`;
          const baseName = prod.name.replace(/（2液）/g, '').replace(/\(2液\)/g, '');
          const blob = [
            prod.name,
            baseName,
            prod.id,
            code,
            mfr.name,
            mfrId,
            type.label,
            type.category === 'water' ? '水性 すいせい' : '弱溶剤 溶剤 ようざい',
            typeId.includes('1') ? '1液 いちえき' : '2液 にえき',
            productKeywordExtra[prod.id] || '',
          ].join(' ');
          productCatalog.push({
            mfrId,
            typeId,
            product: prod,
            productCode: code,
            searchText: blob,
          });
        });
      });
    });

    function norm(s) {
      return String(s || '')
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\u3041-\u3096]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) + 0x60))
        .replace(/[\s\-_・．.,/\\（）()[\]「」【】『』：:;；]/g, '');
    }

    function searchProducts(query, limit = 14) {
      const q = norm(query);
      if (!q || q.length < 1) return [];
      const scored = [];
      productCatalog.forEach((entry) => {
        const hay = norm(entry.searchText);
        const codeNorm = norm(entry.productCode);
        const nameNorm = norm(entry.product.name);
        const idNorm = norm(entry.product.id);
        let score = 0;
        if (codeNorm === q || idNorm === q) score = 100;
        else if (codeNorm.includes(q) || idNorm.includes(q)) score = 80;
        else if (nameNorm.startsWith(q)) score = 70;
        else if (hay.includes(q)) score = 50;
        else if (q.length >= 2 && hay.includes(q.slice(0, Math.min(q.length, 6)))) score = 40;
        if (score > 0) scored.push({ entry, score });
      });
      scored.sort((a, b) => b.score - a.score || a.entry.product.name.localeCompare(b.entry.product.name));
      return scored.slice(0, limit).map((s) => s.entry);
    }

    function resolveSelection(mfrId, typeId, productId, colorId) {
      const mfr = manufacturers[mfrId];
      const type = types.find((t) => t.id === typeId);
      const product = getProducts(mfrId, typeId).find((p) => p.id === productId);
      const color = colorByKey.get(colorId);
      if (!mfr || !type || !product || !color) return null;
      return {
        mfrId,
        mfr,
        typeId,
        type,
        product,
        color,
        code: color.code,
        name: color.name,
        lab: color.lab,
        category: type.category,
        label: `${product.name} / ${color.code}`,
      };
    }

    return {
      manufacturers,
      types,
      products,
      colorSystems,
      colorByKey,
      totalColors,
      productCatalog,
      getProducts,
      getColorsForProduct,
      searchProducts,
      resolveSelection,
    };
  })();

  /** 検索正規化：大小・かな・半角カナ・記号を統一 */
  function normalizeSearchText(s) {
    return String(s || '')
      .normalize('NFKC')
      .toLowerCase()
      .replace(/[\u3041-\u3096]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) + 0x60))
      .replace(/[\s\-_・．.,/\\（）()[\]「」【】『』：:;；]/g, '');
  }

  // ═══════════════════════════════════════════════════════════════
  // 計算エンジン（KM + 乾燥補正）
  // ═══════════════════════════════════════════════════════════════
  function deltaE(l1, l2) {
    return Math.sqrt((l1.L - l2.L) ** 2 + (l1.a - l2.a) ** 2 + (l1.b - l2.b) ** 2);
  }

  function labToRgb(L, a, b) {
    const fy = (L + 16) / 116;
    const fx = a / 500 + fy;
    const fz = fy - b / 200;
    const fI = (t) => (t ** 3 > 0.008856 ? t ** 3 : (t - 16 / 116) / 7.787);
    let X = 95.047 * fI(fx) / 100, Y = 100 * fI(fy) / 100, Z = 108.883 * fI(fz) / 100;
    const lin = (u) => (u <= 0.0031308 ? 12.92 * u : 1.055 * u ** (1 / 2.4) - 0.055);
    const ch = (c) => Math.round(Math.min(255, Math.max(0, lin(c) * 255)));
    return `rgb(${ch(X * 3.2406 + Y * -1.5372 + Z * -0.4986)},${ch(X * -0.9689 + Y * 1.8758 + Z * 0.0415)},${ch(X * 0.0557 + Y * -0.204 + Z * 1.057)})`;
  }

  function reflectanceFromL(L) {
    const Y = ((L + 16) / 116) ** 3 > 0.008856 ? ((L + 16) / 116) ** 3 : L / 903.3;
    return Math.min(0.99, Math.max(0.005, Y));
  }

  function LFromReflectance(R) {
    const Y = Math.min(0.99, Math.max(0.005, R));
    const fy = Y > 0.008856 ? Y ** (1 / 3) : 7.787 * Y + 16 / 116;
    return Math.max(0, Math.min(100, 116 * fy - 16));
  }

  function ksFromR(R) {
    if (R <= 0.005) return 500;
    if (R >= 0.995) return 0.001;
    return (1 - R) ** 2 / (2 * R);
  }

  function RFromKS(ks) {
    return ks <= 0 ? 0.99 : 1 + ks - Math.sqrt(ks ** 2 + 2 * ks);
  }

  function predictLabWithBlack(lab, blackG, baseG, mfr) {
    const total = baseG + blackG;
    if (total <= 0) return { ...lab };
    const fB = blackG / total;
    const R0 = reflectanceFromL(lab.L);
    const KS0 = ksFromR(R0) / mfr.baseRatio;
    const KSblack = mfr.blackKS * mfr.blackTint;
    const KSwhite = mfr.whiteKS * mfr.baseRatio;
    const KSmix = (KS0 * (1 - fB) + KSwhite * 0.12) * (1 - fB) + KSblack * fB;
    const newL = LFromReflectance(RFromKS(KSmix));
    const att = 1 - fB * mfr.blackTint * 0.62;
    return { L: newL, a: lab.a * att, b: lab.b * att };
  }

  function effectiveTargetLab(lab, involvesWater) {
    if (!involvesWater) return { ...lab };
    return { L: Math.min(100, lab.L / DRYING_L_FACTOR), a: lab.a, b: lab.b };
  }

  function calculateBlackToner(current, target, baseG) {
    const mfr = current.mfr;
    const involvesWater =
      current.category === CATEGORY.WATER || target.category === CATEGORY.WATER;
    const eff = effectiveTargetLab(target.lab, involvesWater);
    const maxBlack = Math.min(baseG * 0.35, 250);
    let bestG = 0, bestDE = deltaE(current.lab, eff), bestLab = { ...current.lab };
    for (let g = 0; g <= maxBlack + 0.001; g += 0.01) {
      const rg = Math.round(g * 100) / 100;
      const lab = predictLabWithBlack(current.lab, rg, baseG, mfr);
      const de = deltaE(lab, eff);
      if (de < bestDE) { bestDE = de; bestG = rg; bestLab = lab; }
    }
    const dryLab = involvesWater
      ? { L: bestLab.L * DRYING_L_FACTOR, a: bestLab.a, b: bestLab.b }
      : bestLab;
    return {
      blackGrams: bestG,
      dryDeltaE: deltaE(dryLab, target.lab),
      predictedWet: bestLab,
      predictedDry: dryLab,
      effectiveTarget: eff,
      involvesWater,
    };
  }

  function isIncompatible(a, b) {
    return a && b && a.category !== b.category;
  }

  // ═══════════════════════════════════════════════════════════════
  // 階層セレクト UI
  // ═══════════════════════════════════════════════════════════════
  const $ = (id) => document.getElementById(id);
  const state = { current: null, target: null };

  function selectRow(label, id, disabled) {
    return `
      <label class="block">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1 block">${label}</span>
        <select id="${id}" class="native-select" ${disabled ? 'disabled' : ''}>
          <option value="">選択してください</option>
        </select>
      </label>`;
  }

  function buildPicker(containerId, prefix) {
    const el = $(containerId);
    el.innerHTML = `
      <label class="block relative" id="${prefix}-search-wrap">
        <span class="text-xs font-bold text-amber-400/90 mb-1 block">🔍 製品名・製品番号を入力検索</span>
        <input
          type="search"
          id="${prefix}-product-search"
          autocomplete="off"
          enterkeyhint="search"
          placeholder="例: パーフェクト / クリーンマイルド / 1液 / NP-PT"
          class="product-search-input font-sans"
        />
        <div
          id="${prefix}-product-suggest"
          class="product-suggest hidden absolute z-50 left-0 right-0 mt-1 bg-slate-800 border-2 border-amber-500/40 rounded-xl shadow-2xl"
          role="listbox"
        ></div>
      </label>
      <p class="text-[10px] text-slate-500 text-center">または下の4段階から選択</p>
      ${selectRow('1. メーカー', `${prefix}-mfr`)}
      ${selectRow('2. 性質', `${prefix}-type`, true)}
      ${selectRow('3. 製品名', `${prefix}-product`, true)}
      ${selectRow('4. 色番号', `${prefix}-color`, true)}
    `;
    return {
      search: $(`${prefix}-product-search`),
      suggest: $(`${prefix}-product-suggest`),
      searchWrap: $(`${prefix}-search-wrap`),
      mfr: $(`${prefix}-mfr`),
      type: $(`${prefix}-type`),
      product: $(`${prefix}-product`),
      color: $(`${prefix}-color`),
    };
  }

  const pickers = {
    current: buildPicker('current-picker', 'current'),
    target: buildPicker('target-picker', 'target'),
  };

  function fillOptions(sel, items, valueKey, labelFn, placeholder) {
    sel.innerHTML = `<option value="">${placeholder || '選択してください'}</option>`;
    items.forEach((item) => {
      const opt = document.createElement('option');
      opt.value = item[valueKey];
      opt.textContent = labelFn(item);
      sel.appendChild(opt);
    });
    sel.disabled = items.length === 0;
  }

  function resetDown(picker, from) {
    const order = ['type', 'product', 'color'];
    const start = order.indexOf(from);
    for (let i = start; i < order.length; i++) {
      const key = order[i];
      picker[key].innerHTML = '<option value="">選択してください</option>';
      picker[key].disabled = true;
      picker[key].value = '';
    }
  }

  /** 製品検索から階層セレクトを同期 */
  function syncProductToPicker(picker, entry, focusColor) {
    const { mfrId, typeId, product } = entry;
    const mfr = ColorDatabase.manufacturers[mfrId];
    const type = ColorDatabase.types.find((t) => t.id === typeId);

    picker.mfr.value = mfrId;
    fillOptions(picker.type, ColorDatabase.types, 'id', (t) => t.label);
    picker.type.disabled = false;
    picker.type.value = typeId;

    const prods = ColorDatabase.getProducts(mfrId, typeId);
    fillOptions(picker.product, prods, 'id', (x) => x.name);
    picker.product.disabled = false;
    picker.product.value = product.id;

    const colors = ColorDatabase.getColorsForProduct(product);
    fillOptions(picker.color, colors, 'id', (c) => c.display);
    picker.color.disabled = false;
    picker.color.value = '';

    if (focusColor) {
      setTimeout(() => {
        picker.color.focus();
        try { picker.color.click(); } catch (_) { /* iOS */ }
      }, 80);
    }
    return { mfr, type, product };
  }

  function renderProductSuggest(container, items, onPick) {
    if (!items.length) {
      container.classList.add('hidden');
      container.innerHTML = '';
      return;
    }
    container.innerHTML = items.map((entry) => {
      const mfr = ColorDatabase.manufacturers[entry.mfrId];
      const type = ColorDatabase.types.find((t) => t.id === entry.typeId);
      const badge =
        entry.mfrId === 'nippon' ? '日塗' : entry.mfrId === 'kansai' ? '関西' : 'SK';
      return `
        <button type="button" role="option"
          class="product-suggest-item w-full text-left px-4 py-3 border-b border-slate-700 last:border-0 hover:bg-slate-700/60"
          data-mfr="${entry.mfrId}" data-type="${entry.typeId}" data-product="${entry.product.id}">
          <span class="font-bold text-base block text-slate-100">${entry.product.name}</span>
          <span class="text-xs text-slate-400 mt-0.5 block">
            ${badge} · ${type.label} · <span class="font-mono">${entry.productCode}</span>
          </span>
        </button>`;
    }).join('');
    container.classList.remove('hidden');
    container.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const entry = ColorDatabase.productCatalog.find(
          (e) => e.mfrId === btn.dataset.mfr
            && e.typeId === btn.dataset.type
            && e.product.id === btn.dataset.product,
        );
        if (entry) onPick(entry);
        container.classList.add('hidden');
      });
    });
  }

  function wireProductSearch(picker, prefix, stateKey) {
    const { search, suggest, searchWrap } = picker;

    search.addEventListener('input', () => {
      const q = search.value.trim();
      if (!q) {
        suggest.classList.add('hidden');
        return;
      }
      renderProductSuggest(suggest, ColorDatabase.searchProducts(q), (entry) => {
        syncProductToPicker(picker, entry, true);
        search.value = entry.product.name;
        updateSelection(prefix, stateKey);
      });
    });

    search.addEventListener('focus', () => {
      const q = search.value.trim();
      if (q) {
        renderProductSuggest(suggest, ColorDatabase.searchProducts(q), (entry) => {
          syncProductToPicker(picker, entry, true);
          search.value = entry.product.name;
          updateSelection(prefix, stateKey);
        });
      }
    });

    document.addEventListener('click', (e) => {
      if (!searchWrap.contains(e.target)) suggest.classList.add('hidden');
    });
  }

  function wirePicker(prefix, stateKey) {
    const p = pickers[prefix];
    const preview = $(`${prefix}-preview`);
    const swatch = $(`${prefix}-swatch`);
    const title = $(`${prefix}-preview-title`);
    const meta = $(`${prefix}-preview-meta`);

    fillOptions(
      p.mfr,
      Object.values(ColorDatabase.manufacturers),
      'id',
      (m) => m.name,
    );

    p.mfr.addEventListener('change', () => {
      resetDown(p, 'type');
      if (!p.mfr.value) { updateSelection(prefix, stateKey); return; }
      fillOptions(p.type, ColorDatabase.types, 'id', (t) => t.label);
      p.type.disabled = false;
      updateSelection(prefix, stateKey);
    });

    p.type.addEventListener('change', () => {
      resetDown(p, 'product');
      if (!p.type.value) { updateSelection(prefix, stateKey); return; }
      const prods = ColorDatabase.getProducts(p.mfr.value, p.type.value);
      fillOptions(p.product, prods, 'id', (x) => x.name);
      p.product.disabled = false;
      updateSelection(prefix, stateKey);
    });

    p.product.addEventListener('change', () => {
      p.color.innerHTML = '<option value="">選択してください</option>';
      p.color.disabled = true;
      p.color.value = '';
      if (!p.product.value) { updateSelection(prefix, stateKey); return; }
      const prod = ColorDatabase.getProducts(p.mfr.value, p.type.value)
        .find((x) => x.id === p.product.value);
      const colors = ColorDatabase.getColorsForProduct(prod);
      fillOptions(p.color, colors, 'id', (c) => c.display);
      p.color.disabled = false;
      updateSelection(prefix, stateKey);
    });

    p.color.addEventListener('change', () => updateSelection(prefix, stateKey));

    wireProductSearch(p, prefix, stateKey);
  }

  function updateSelection(prefix, stateKey) {
    const p = pickers[prefix];
    const sel = ColorDatabase.resolveSelection(
      p.mfr.value, p.type.value, p.product.value, p.color.value,
    );
    state[stateKey] = sel;

    const preview = $(`${prefix}-preview`);
    if (sel) {
      preview.classList.remove('hidden');
      $(`${prefix}-swatch`).style.background = labToRgb(sel.lab.L, sel.lab.a, sel.lab.b);
      $(`${prefix}-preview-title`).textContent = `${sel.product.name} · ${sel.code}`;
      $(`${prefix}-preview-meta`).textContent =
        `${sel.mfr.name} / ${sel.type.label} / L*${sel.lab.L} a*${sel.lab.a} b*${sel.lab.b}`;
    } else {
      preview.classList.add('hidden');
    }
    updateUI();
  }

  function updateUI() {
    const { current, target } = state;
    const bad = isIncompatible(current, target);
    const warn = $('compat-warning');
    if (bad) {
      warn.classList.remove('hidden');
      $('compat-detail').textContent =
        `${current.type.label}（${current.product.name}）↔ ${target.type.label}（${target.product.name}）`;
    } else warn.classList.add('hidden');

    const mass = parseFloat($('mass-input').value);
    const ok = current && target && !bad && mass > 0;
    $('calc-btn').disabled = !ok;
    if (!ok) $('result-panel').classList.add('hidden');
  }

  wirePicker('current', 'current');
  wirePicker('target', 'target');
  $('mass-input').addEventListener('input', updateUI);

  $('calc-btn').addEventListener('click', () => {
    const { current, target } = state;
    if (!current || !target) return;
    const baseG = parseFloat($('mass-input').value);
    const r = calculateBlackToner(current, target, baseG);
    $('result-grams').textContent = r.blackGrams.toFixed(2);
    $('result-de').textContent = r.dryDeltaE.toFixed(2);
    $('result-dry').textContent = r.involvesWater
      ? `水性 L*×${DRYING_L_FACTOR} 補正済` : '補正なし';
    const pct = ((r.blackGrams / (baseG + r.blackGrams)) * 100).toFixed(2);
    $('result-detail').innerHTML = [
      `現状: ${current.code} L*${current.lab.L.toFixed(1)} a*${current.lab.a.toFixed(1)} b*${current.lab.b.toFixed(1)}`,
      `目標: ${target.code} L*${target.lab.L.toFixed(1)} a*${target.lab.a.toFixed(1)} b*${target.lab.b.toFixed(1)}`,
      r.involvesWater ? `湿り目標 L*: ${r.effectiveTarget.L.toFixed(1)}` : '',
      `製品: ${current.product.name} → ${target.product.name}`,
      `予測（乾）ΔE: ${r.dryDeltaE.toFixed(2)} / 黒比率 ${pct}%`,
    ].filter(Boolean).join('<br>');
    $('result-panel').classList.remove('hidden');
    $('result-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  $('db-stats').textContent =
    `IRO-HACK v2.1 · 色 ${ColorDatabase.totalColors.toLocaleString()} · 製品 ${ColorDatabase.productCatalog.length} · 検索対応`;

  updateUI();
})();
</script>
